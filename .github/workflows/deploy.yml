name: Deploy to Alibaba Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_build:
        description: '跳过构建（仅重启服务）'
        required: false
        default: 'false'
        type: boolean

env:
  SERVER_HOST: 47.88.52.213
  SERVER_USER: root
  SERVER_PATH: /home/zengxiao/study-test

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build
        if: github.event.inputs.skip_build != 'true'
        run: |
          npm ci
          cd server && npm ci && cd ..
          npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/private_key
          chmod 600 ~/.ssh/private_key

      - name: Deploy to server
        run: |
          rsync -avz --delete ./dist/ -e "ssh -i ~/.ssh/private_key" root@${{ env.SERVER_HOST }}:${{ env.SERVER_PATH }}/dist/
          rsync -avz --delete ./server/src/ -e "ssh -i ~/.ssh/private_key" root@${{ env.SERVER_HOST }}:${{ env.SERVER_PATH }}/server/src/
          rsync -avz ./package.json -e "ssh -i ~/.ssh/private_key" root@${{ env.SERVER_HOST }}:${{ env.SERVER_PATH }}/
          rsync -avz ./server/package.json -e "ssh -i ~/.ssh/private_key" root@${{ env.SERVER_HOST }}:${{ env.SERVER_PATH }}/server/

      - name: Update environment files
        run: |
          printf '%s\n' \
            "PORT=3100" \
            "NODE_ENV=production" \
            "TRUST_PROXY=1" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "JWT_EXPIRES_IN=7d" \
            "DB_HOST=${{ secrets.DB_HOST }}" \
            "DB_PORT=${{ secrets.DB_PORT }}" \
            "DB_USER=${{ secrets.DB_USER }}" \
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            "DB_NAME=${{ secrets.DB_NAME }}" \
            "BAIDU_API_KEY=${{ secrets.BAIDU_API_KEY }}" \
            "BAIDU_SECRET_KEY=${{ secrets.BAIDU_SECRET_KEY }}" \
            "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" \
            | ssh -i ~/.ssh/private_key root@${{ env.SERVER_HOST }} "mkdir -p ${{ env.SERVER_PATH }}/server && cat > ${{ env.SERVER_PATH }}/server/.env && chmod 600 ${{ env.SERVER_PATH }}/server/.env"

      - name: Install dependencies and restart
        run: |
          ssh -i ~/.ssh/private_key root@${{ env.SERVER_HOST }} << 'SSHEOF'
            set -e
            cd ${{ env.SERVER_PATH }}/server
            npm ci --production
            pm2 restart study-server || pm2 start src/index.js --name study-server
            pm2 save
            nginx -t && nginx -s reload
          SSHEOF

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.xiaoyue.shop/api/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ 健康检查成功"
          else
            echo "❌ 健康检查失败，状态码：$STATUS"
            exit 1
          fi

      - name: Deploy completed
        run: |
          echo "✅ 部署成功！"
          echo "🌐 访问地址：https://www.xiaoyue.shop"