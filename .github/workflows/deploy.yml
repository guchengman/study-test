name: Deploy to Alibaba Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'и·іиҝҮжһ„е»әпјҲд»…йҮҚеҗҜжңҚеҠЎпјү'
        required: false
        default: 'false'
        type: boolean

env:
  SERVER_HOST: 47.88.52.213
  SERVER_USER: root
  SERVER_PATH: /home/zengxiao/study-test
  NODE_ENV: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. жЈҖеҮәд»Јз Ғ
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. и®ҫзҪ® Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. е®үиЈ…дҫқиө– & жһ„е»әпјҲеҸҜи·іиҝҮпјү
      - name: Install and Build
        if: github.event.inputs.skip_build != 'true'
        run: |
          npm ci
          cd server && npm ci && cd ..
          npm run build
        env:
          VITE_API_BASE_URL: /api

      # 4. й…ҚзҪ® SSH
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/private_key
          chmod 600 ~/.ssh/private_key
          chmod 700 ~/.ssh

          cat > ~/.ssh/config << EOF
          Host server
          HostName ${{ env.SERVER_HOST }}
          User ${{ env.SERVER_USER }}
          IdentityFile ~/.ssh/private_key
          StrictHostKeyChecking no
          EOF

      # 5. йғЁзҪІеҲ°жңҚеҠЎеҷЁ + иҮӘеҠЁеӨҮд»Ҫ
      - name: Deploy to server
        run: |
          BACKUP_TIME=$(date +%Y%m%d_%H%M%S)
          ssh server "mkdir -p ${{ env.SERVER_PATH }}/backup"

          # еӨҮд»Ҫ
          ssh server "cp -r ${{ env.SERVER_PATH }}/dist ${{ env.SERVER_PATH }}/backup/dist_$BACKUP_TIME 2>/dev/null || true"
          ssh server "cp -r ${{ env.SERVER_PATH }}/server/src ${{ env.SERVER_PATH }}/backup/server_src_$BACKUP_TIME 2>/dev/null || true"

          # еҗҢжӯҘж–Үд»¶
          rsync -avz --delete ./dist/ server:${{ env.SERVER_PATH }}/dist/
          rsync -avz --delete ./server/src/ server:${{ env.SERVER_PATH }}/server/src/
          rsync -avz ./package.json server:${{ env.SERVER_PATH }}/
          rsync -avz ./server/package.json server:${{ env.SERVER_PATH }}/server/

      # 6. з”ҹжҲҗжңҚеҠЎеҷЁ .env зҺҜеўғеҸҳйҮҸ
      - name: Update environment files
        run: |
          ssh server "cat > ${{ env.SERVER_PATH }}/server/.env << 'EOF'
PORT=3100
NODE_ENV=production
TRUST_PROXY=1
JWT_SECRET=${{ secrets.JWT_SECRET }}
JWT_EXPIRES_IN=7d
DB_HOST=${{ secrets.DB_HOST }}
DB_PORT=${{ secrets.DB_PORT }}
DB_USER=${{ secrets.DB_USER }}
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
DB_NAME=${{ secrets.DB_NAME }}
BAIDU_API_KEY=${{ secrets.BAIDU_API_KEY }}
BAIDU_SECRET_KEY=${{ secrets.BAIDU_SECRET_KEY }}
DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
EOF"
          ssh server "chmod 600 ${{ env.SERVER_PATH }}/server/.env"

      # 7. е®үиЈ…дҫқиө– & йҮҚеҗҜжңҚеҠЎ
      - name: Install dependencies and restart
        run: |
          ssh server << 'EOF'
          set -e
          cd ${{ env.SERVER_PATH }}/server

          echo "==> е®үиЈ…з”ҹдә§дҫқиө–"
          npm ci --production

          echo "==> йҮҚеҗҜжңҚеҠЎ"
          pm2 restart study-server || pm2 start src/index.js --name study-server
          pm2 save

          echo "==> йҮҚеҗҜ Nginx"
          nginx -t && nginx -s reload
          EOF

      # 8. еҒҘеә·жЈҖжҹҘ
      - name: Health check
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.xiaoyue.shop/api/health || echo "000")

          if [ "$STATUS" = "200" ]; then
            echo "вң… еҒҘеә·жЈҖжҹҘжҲҗеҠҹ"
          else
            echo "вқҢ еҒҘеә·жЈҖжҹҘеӨұиҙҘпјҢзҠ¶жҖҒз Ғпјҡ$STATUS"
            exit 1
          fi

      # 9. е®ҢжҲҗйҖҡзҹҘ
      - name: Deploy completed
        run: |
          echo "вң… йғЁзҪІжҲҗеҠҹпјҒ"
          echo "рҹҢҗ и®ҝй—®ең°еқҖпјҡhttps://www.xiaoyue.shop"